services:
  backend:
    container_name: dbo-studio-dev-api
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/back/
    environment:
      APP_PORT: "8080"
      APP_ENV: "testing"
      DB_TEST_CONNECTION: "pgsql"
      DB_TEST_HOST: "sample-pgsql"
      DB_TEST_PORT: "5432"
      DB_TEST_DATABASE: "default"
      DB_TEST_USERNAME: "default"
      DB_TEST_PASSWORD: "secret"
    ports:
      - "8080:8080"
    depends_on:
      - sample-pgsql

  frontend:
    container_name: dbo-studio-dev-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/index.html
      - ./frontend/package.json:/package.json
    environment:
      VITE_PUBLIC_SERVER_URL: "http://localhost:8080/api"
      NODE_ENV: "development"
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - sample-pgsql

  sample-pgsql:
    container_name: dbo-studio-sample-pgsql
    image: postgres:16.1
    ports:
      - "${DB_TEST_PORT-5432}:5432"
    volumes:
      - "./docker/data/pgsql:/var/lib/postgresql/data"
      - "./docs/sample_db/public.sql:/docker-entrypoint-initdb.d/public.sql"
    platform: "linux/amd64"
    environment:
      POSTGRES_DB: default
      POSTGRES_USER: default
      POSTGRES_PASSWORD: secret

  jaeger:
    container_name: dbo-studio-jaeger
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.10.0
    volumes:
      - ./docker/jaeger:/data:Z
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "5778:5778"
      - "9411:9411"
    environment:
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: false
      BADGER_DIRECTORY_VALUE: /data/badger
      BADGER_DIRECTORY_KEY: /data/badger
